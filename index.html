<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LCC Redding Volunteer Registration & Requirements</title>
  <script src="https://js.churchcenter.com/modal/v1"></script>
  <style>
    :root {
      --bg:          #0a0a0a;
      --surface:     #131313;
      --surface2:    #1a1a1a;
      --surface3:    #222222;
      --border:      rgba(255,255,255,0.06);
      --border-hi:   rgba(83,205,189,0.3);
      --teal:        #53cdbd;
      --teal-dark:   #195b51;
      --teal-mid:    #399589;
      --teal-glow:   rgba(83,205,189,0.09);
      --teal-dim:    rgba(83,205,189,0.04);
      --text:        #ededed;
      --text2:       rgba(237,237,237,0.5);
      --text3:       rgba(237,237,237,0.24);
      --danger:      #c95f5f;
      --danger-bg:   rgba(201,95,95,0.06);
      --warn:        #c49a3c;
      --warn-bg:     rgba(196,154,60,0.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── PROGRESS BAR ── */
    #prog-wrap {
      position: fixed; top: 0; left: 0; right: 0;
      height: 2px; background: rgba(255,255,255,0.04); z-index: 999;
    }
    #prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--teal-dark), var(--teal));
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
      width: 0%;
    }

    /* ── LAYOUT ── */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px 100px;
    }
    .container { width: 100%; max-width: 640px; }

    /* ── HEADER ── */
    .site-header {
      width: 100%; max-width: 640px;
      padding: 52px 0 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 40px;
    }
    .logo {
      height: 64px;
      width: auto;
      display: block;
    }
    .logo-fallback {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--teal);
    }

    /* ── SCREEN ANIMATION ── */
    .screen { animation: fadeUp .36s cubic-bezier(.4,0,.2,1); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 36px;
      margin-bottom: 14px;
    }
    @media (max-width: 500px) { .card { padding: 24px 20px; } }

    /* ── TYPE ── */
    .eyebrow {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--teal); margin-bottom: 12px;
    }
    .title {
      font-size: clamp(20px, 3.8vw, 26px);
      font-weight: 700; letter-spacing: -.2px; line-height: 1.25; margin-bottom: 10px;
    }
    .body-text {
      font-size: 15px; color: var(--text2); line-height: 1.8; margin-bottom: 22px;
    }
    .body-text strong { color: var(--text); font-weight: 600; }
    .small-text { font-size: 13px; color: var(--text3); line-height: 1.6; }

    /* ── TIME PILL ── */
    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 12px;
      font-size: 11px; color: var(--text3);
      margin-bottom: 20px; letter-spacing: .2px;
    }

    /* ── STEP COUNTER ── */
    .step-counter {
      display: flex; align-items: center; gap: 12px; margin-bottom: 30px;
    }
    .step-counter-label { font-size: 11px; color: var(--text3); font-weight: 500; white-space: nowrap; }
    .step-counter-track {
      flex: 1; height: 1px; background: var(--border); border-radius: 1px; overflow: hidden;
    }
    .step-counter-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--teal-dark), var(--teal));
      transition: width .4s ease;
    }

    /* ── DIVIDER ── */
    .divider { height: 1px; background: var(--border); margin: 24px 0; }
    .or-div {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; font-size: 11px; color: var(--text3); letter-spacing: .5px;
    }
    .or-div::before, .or-div::after { content:''; flex:1; height:1px; background: var(--border); }

    /* ── NOTICE BOXES ── */
    .notice {
      border-radius: 10px; padding: 16px 20px; margin-bottom: 20px;
    }
    .notice.warn   { background: var(--warn-bg);   border: 1px solid rgba(196,154,60,.18); }
    .notice.info   { background: var(--teal-dim);  border: 1px solid rgba(83,205,189,.14); }
    .notice.danger { background: var(--danger-bg); border: 1px solid rgba(201,95,95,.18); }
    .notice-label {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .notice.warn   .notice-label { color: var(--warn); }
    .notice.info   .notice-label { color: var(--teal); }
    .notice.danger .notice-label { color: var(--danger); }
    .notice p { font-size: 13px; color: var(--text2); line-height: 1.7; }
    .notice p strong { color: var(--text); font-weight: 600; }

    /* ── EMPHASIS ── */
    .em-eyebrow {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--teal); display: block; margin-bottom: 8px;
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px; padding: 13px 22px; border-radius: 9px;
      font-size: 14px; font-weight: 600; cursor: pointer; border: none;
      transition: all .2s ease; text-decoration: none;
      letter-spacing: .1px; white-space: nowrap; outline: none;
    }
    .btn-primary { background: var(--teal); color: #0a0a0a; }
    .btn-primary:hover { background: #65d9ca; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(83,205,189,.18); }
    .btn-primary:disabled { opacity: .28; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-outline { background: transparent; color: var(--text2); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: rgba(255,255,255,.15); color: var(--text); }
    .btn-ghost { background: transparent; color: var(--text3); border: none; font-size: 13px; padding: 10px 16px; }
    .btn-ghost:hover { color: var(--text2); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #d97070; }
    .btn-secondary { background: var(--surface2); color: var(--teal); border: 1px solid rgba(83,205,189,.2); }
    .btn-secondary:hover { background: var(--teal-glow); border-color: rgba(83,205,189,.35); }
    .btn-full { width: 100%; }

    /* ── NAV ROW ── */
    .nav-row {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--border);
    }

    /* ── HOME SCREEN ── */
    .home-logo-wrap { text-align: center; margin-bottom: 48px; }
    .home-logo { height: 96px; width: auto; }
    .home-tagline {
      font-size: 22px; font-weight: 700; letter-spacing: -.2px;
      color: var(--text); margin-top: 22px; line-height: 1.2;
    }
    .home-tagline span {
      display: block; font-size: 12px; font-weight: 500; letter-spacing: 2px;
      text-transform: uppercase; color: var(--text3); margin-top: 6px;
    }
    .home-options { display: flex; flex-direction: column; gap: 10px; }
    .home-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 20px 22px; cursor: pointer; transition: all .2s ease;
      display: flex; align-items: center; gap: 16px;
      text-decoration: none; color: inherit; text-align: left;
    }
    .home-card:hover { border-color: var(--border-hi); background: var(--surface2); }
    .home-card-icon {
      width: 38px; height: 38px; border-radius: 9px;
      background: var(--teal-dim); border: 1px solid rgba(83,205,189,.12);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; color: var(--teal);
    }
    .home-card-body { flex: 1; }
    .home-card-body h3 { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
    .home-card-body p { font-size: 12px; color: var(--text2); line-height: 1.5; }
    .home-card-chevron { color: var(--text3); flex-shrink: 0; }

    /* ── MINISTRY GRID ── */
    .ministry-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 7px; margin-bottom: 24px; }
    @media (max-width: 460px) { .ministry-grid { grid-template-columns: 1fr; } }
    .min-opt {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      padding: 11px 14px; cursor: pointer; transition: all .16s ease;
      font-size: 13px; font-weight: 500; color: var(--text2); text-align: left; line-height: 1.35;
    }
    .min-opt:hover { border-color: rgba(83,205,189,.22); color: var(--text); }
    .min-opt.sel { background: var(--teal-glow); border-color: var(--teal); color: var(--teal); font-weight: 600; }

    /* ── YES/NO ── */
    .yn-wrap { display: flex; gap: 9px; margin-bottom: 20px; }
    .yn-btn {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 9px; padding: 14px 12px; cursor: pointer; font-size: 14px;
      font-weight: 600; color: var(--text2); transition: all .16s ease; text-align: center;
    }
    .yn-btn:hover { border-color: rgba(83,205,189,.2); color: var(--text); }
    .yn-yes { background: var(--teal-glow); border-color: var(--teal); color: var(--teal); }
    .yn-no  { background: var(--danger-bg); border-color: rgba(201,95,95,.3); color: var(--danger); }

    /* ── TRACK INTRO ── */
    .track-card {
      background: linear-gradient(145deg, #0d2420, #0f2e28);
      border: 1px solid rgba(83,205,189,.14);
      border-radius: 14px; padding: 44px 38px; text-align: center; margin-bottom: 14px;
      position: relative; overflow: hidden;
    }
    .track-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(83,205,189,.3), transparent);
    }
    .track-logo {
      height: 44px; width: auto; margin: 0 auto 28px; display: block;
      opacity: .9;
    }
    .track-card h2 {
      font-size: clamp(17px,3.5vw,22px); font-weight: 700; color: #fff;
      margin-bottom: 14px; line-height: 1.3;
      letter-spacing: -.1px;
    }
    .track-card h2 span {
      display: block; font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--teal); margin-bottom: 8px;
    }
    .track-card p { font-size: 14px; color: rgba(255,255,255,.6); line-height: 1.75; margin-bottom: 8px; }
    .track-em { font-size: 12px; font-weight: 700; color: var(--teal); display: block; margin-bottom: 10px; letter-spacing: .3px; }
    .track-time { font-size: 12px; color: rgba(255,255,255,.35); }

    /* ── ADOBE SIGN ── */
    .sign-wrap {
      width: 100%; height: 500px; border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; background: var(--surface2); margin-bottom: 14px;
    }
    .sign-wrap iframe { width: 100%; height: 100%; border: none; }
    .how-to {
      background: var(--teal-dim); border: 1px solid rgba(83,205,189,.12);
      border-radius: 9px; padding: 16px 18px; margin-bottom: 18px;
    }
    .how-to .how-label {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--teal); margin-bottom: 10px;
    }
    .how-to ol { padding-left: 18px; font-size: 13px; color: var(--text2); line-height: 1.9; }
    .how-to ol li + li { margin-top: 3px; }

    /* ── PC FORM BLOCK ── */
    .pc-block {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
      padding: 26px 22px; display: flex; flex-direction: column; align-items: center;
      gap: 12px; text-align: center; margin-bottom: 14px;
    }
    .pc-block-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--teal-dim); border: 1px solid rgba(83,205,189,.12);
      display: flex; align-items: center; justify-content: center; color: var(--teal);
    }
    .pc-block p { font-size: 13px; color: var(--text2); line-height: 1.65; max-width: 360px; }

    /* ── TRAINING ── */
    .training-box {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 20px 22px; margin-bottom: 16px;
    }
    .training-box .t-label {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--teal); margin-bottom: 12px;
    }
    .training-box ol { padding-left: 20px; font-size: 13px; color: var(--text2); line-height: 1.9; }
    .training-box ol li + li { margin-top: 4px; }

    /* ── UPLOAD ── */
    .upload-zone {
      border: 1px dashed rgba(83,205,189,.24); border-radius: 10px; padding: 28px;
      text-align: center; cursor: pointer; transition: all .2s ease;
      background: rgba(83,205,189,.02); margin-bottom: 12px; display: block;
    }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--teal); background: var(--teal-glow); }
    .upload-zone input[type="file"] { display: none; }
    .upload-zone .u-icon { color: var(--teal); opacity: .5; margin-bottom: 10px; }
    .upload-zone p { font-size: 13px; color: var(--text2); }
    .upload-zone .browse { color: var(--teal); }

    /* ── ADDRESS CARD ── */
    .addr-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 20px 22px; display: flex; gap: 16px; margin-bottom: 14px;
    }
    .addr-icon { color: var(--teal); flex-shrink: 0; margin-top: 2px; opacity: .7; }
    .addr-info h4 { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    .addr-info p { font-size: 13px; color: var(--text2); line-height: 1.8; }
    .addr-info a { color: var(--teal); text-decoration: none; font-weight: 500; }
    .addr-info a:hover { text-decoration: underline; }

    /* ── FAIL ── */
    .fail-card {
      background: var(--danger-bg); border: 1px solid rgba(201,95,95,.16);
      border-radius: 14px; padding: 48px 36px; text-align: center;
    }
    .fail-icon {
      width: 56px; height: 56px; border-radius: 50%;
      background: rgba(201,95,95,.1); border: 1px solid rgba(201,95,95,.25);
      display: flex; align-items: center; justify-content: center;
      color: var(--danger); margin: 0 auto 20px;
    }
    .fail-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
    .fail-card p { font-size: 14px; color: var(--text2); line-height: 1.75; margin-bottom: 26px; max-width: 420px; margin-left: auto; margin-right: auto; }

    /* ── COMPLETE ── */
    .complete-card {
      background: linear-gradient(145deg, #0d2420, #0f2e28);
      border: 1px solid rgba(83,205,189,.14);
      border-radius: 14px; padding: 60px 36px; text-align: center;
      position: relative; overflow: hidden;
    }
    .complete-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(83,205,189,.35), transparent);
    }
    .complete-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(83,205,189,.1); border: 1px solid rgba(83,205,189,.3);
      display: flex; align-items: center; justify-content: center;
      color: var(--teal); margin: 0 auto 22px;
      animation: cpop .5s cubic-bezier(.34,1.56,.64,1);
    }
    .complete-logo { height: 36px; width: auto; margin: 0 auto 26px; display: block; opacity: .6; }
    @keyframes cpop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .complete-card h2 { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 10px; }
    .complete-card p { font-size: 14px; color: rgba(255,255,255,.55); line-height: 1.8; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
  </style>
</head>
<body>

<div id="prog-wrap"><div id="prog-fill"></div></div>
<div class="page" id="app"></div>

<script>
// ── SVG ICONS ────────────────────────────────────────────────
const I = {

  exit:     `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>`,
  globe:    `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
  arrowR:   `→`,
  arrowL:   `←`,
};

// ── DATA ─────────────────────────────────────────────────────
const MINISTRIES = [
  "Classics (Over 60's Ministry)",
  'Country Christian School',
  'First Impressions (Greeters and Ushers Ministry)',
  'Haven (Young Adult Ministry)',
  "H.E.R. Ministry (Women's)",
  'HighSight (9th–12th Grade)',
  'KidZone (Infants–5th Grade)',
  'Life Groups (Small Group Ministry)',
  'Media/Tech',
  "Men's Ministry",
  'Prayer Chain',
  'Prison Ministry',
  'Triumph (6th–8th Grade)',
  'Widow Wood for Christ',
  'Witness (Missions & Outreach Ministry)',
  'Worship Ministry'
];

const YOUTH_OPT    = ['Haven (Young Adult Ministry)', "H.E.R. Ministry (Women's)", 'Witness (Missions & Outreach Ministry)'];
const YOUTH_ALWAYS = ['Country Christian School', 'HighSight (9th–12th Grade)', 'KidZone (Infants–5th Grade)', 'Triumph (6th–8th Grade)'];

const TRACK_ITEMS = {
  1: [1, 3, 4, 5, 6, 7, 8, 10, 11],
  2: [1, 3, 4, 10, 11],
  3: [1, 3, 9, 10, 11]
};

// ── STATE ────────────────────────────────────────────────────
const S = {
  screen: 'home',
  q1: null, q2: null, q3: null,
  track: null, items: [], idx: 0,
  failId: null,
  i4ans: null, i9ans: null, i10ans: null,
  i5cert: null,
};

// ── LOGIC ────────────────────────────────────────────────────
function determineTrack() {
  const { q1, q2, q3 } = S;
  if (q3 === 'no') return 3;
  if (YOUTH_ALWAYS.includes(q1)) return 1;
  if (YOUTH_OPT.includes(q1) && q2 === 'yes') return 1;
  return 2;
}

function calcProgress() {
  const { screen, idx, items } = S;
  if (screen === 'home')        return 0;
  if (screen === 'opening')     return 5;
  if (screen === 'questions')   return 12;
  if (screen === 'track_intro') return 16;
  if (screen === 'fail')        return 0;
  if (screen === 'farewell')    return 0;
  if (screen === 'complete')    return 100;
  if (screen === 'item' && items.length)
    return 16 + Math.round(((idx + 1) / items.length) * 84);
  return 0;
}

// ── NAVIGATION ───────────────────────────────────────────────
function go(screen) {
  S.screen = screen;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  document.getElementById('prog-fill').style.width = calcProgress() + '%';
}

function submitQ()    { S.track = determineTrack(); S.items = TRACK_ITEMS[S.track]; S.idx = 0; go('track_intro'); }
function beginItems() { go('item'); }
function nextItem()   { S.idx < S.items.length - 1 ? (S.idx++, go('item')) : go('complete'); }
function prevItem()   { S.idx > 0 ? (S.idx--, go('item')) : go('track_intro'); }
function fail(id)     { S.failId = id; go('fail'); }

function reset() {
  Object.assign(S, { screen:'home', q1:null, q2:null, q3:null, track:null, items:[], idx:0, failId:null, i4ans:null, i9ans:null, i10ans:null, i5cert:null });
  render();
  document.getElementById('prog-fill').style.width = '0%';
}

// ── RENDER ROUTER ────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  // Header — skip on home screen (it renders its own larger logo)
  if (S.screen !== 'home') {
    const hdr = document.createElement('header');
    hdr.className = 'site-header container';
    hdr.innerHTML = `
      <img src="logo-white.png" class="logo" alt="LCC Redding"
        onerror="this.outerHTML='<span class=\\'logo-fallback\\'>LCC Redding</span>'">
    `;
    app.appendChild(hdr);
  }

  const wrap = document.createElement('div');
  wrap.className = 'screen container';

  const screens = {
    home: renderHome, opening: renderOpening, questions: renderQuestions,
    track_intro: renderTrackIntro, item: renderItem,
    fail: renderFail, complete: renderComplete, farewell: renderFarewell
  };
  wrap.innerHTML = (screens[S.screen] || (() => ''))();
  app.appendChild(wrap);
  attachListeners();
}

// ── ITEM ROUTER ──────────────────────────────────────────────
function renderItem() {
  const total = S.items.length;
  const pos   = S.idx + 1;
  const pct   = (pos / total) * 100;
  const counter = `
    <div class="step-counter">
      <span class="step-counter-label">Step ${pos} of ${total}</span>
      <div class="step-counter-track">
        <div class="step-counter-fill" style="width:${pct}%"></div>
      </div>
    </div>`;

  const fns = { 1:item1, 3:item3, 4:item4, 5:item5, 6:item6, 7:item7, 8:item8, 9:item9, 10:item10, 11:item11 };
  const fn  = fns[S.items[S.idx]];
  return counter + (fn ? fn(pos, total) : '');
}

function navRow(onNext, label, disabled) {
  return `
    <div class="nav-row">
      <button class="btn btn-outline" onclick="prevItem()" ${S.idx===0?'style="visibility:hidden"':''}>${I.arrowL} Back</button>
      <button class="btn btn-primary" onclick="${onNext}" ${disabled?'disabled':''}>${label} ${I.arrowR}</button>
    </div>`;
}

}

// ── ITEM 9 ───────────────────────────────────────────────────
function item9(pos, total) {
  const ans = S.i9ans;
  return `
    <div class="card">
      <div class="eyebrow">Step ${pos} of ${total}</div>
      <h2 class="title">When You Turn 18</h2>
      <p class="body-text">When you turn 18, your current volunteer records will no longer be valid. At that point, you'll need to complete this process again under the adult volunteer requirements for your ministry. We'll reach out when that time comes.</p>
      <div class="divider"></div>
      <p style="font-size:14px;font-weight:600;margin-bottom:14px;">Do you agree to complete the adult volunteer requirements when you turn 18?</p>
      <div class="yn-wrap">
        <button class="yn-btn${ans==='yes'?' yn-yes':''}" onclick="setI9('yes')">Yes, I agree</button>
        <button class="yn-btn${ans==='no'?' yn-no':''}"  onclick="setI9('no')">No</button>
      </div>
      ${ans === 'no' ? `
        <div class="notice danger" style="margin-bottom:0;">
          <div class="notice-label">Are You Sure?</div>
          <p style="margin-bottom:14px;">Completing adult requirements when you turn 18 is a condition of volunteering as a minor. Without this agreement, your volunteer service would need to end when you reach adulthood.</p>
          <button class="btn btn-danger" onclick="fail('minor')" style="font-size:13px;padding:10px 20px;">I understand — I cannot proceed</button>
        </div>
      ` : ''}
      <div class="nav-row">
        <button class="btn btn-outline" onclick="prevItem()">${I.arrowL} Back</button>
        <button class="btn btn-primary" onclick="nextItem()" ${ans==='yes'?'':'disabled'}>Continue ${I.arrowR}</button>
      </div>
    </div>`;
}

// ── ITEM 10 ──────────────────────────────────────────────────
function item10(pos, total) {
  const ans = S.i10ans;
  return `

      <div class="eyebrow">Step ${pos} of ${total}</div>

      <p class="body-text">

        This form helps us update your status, close out your records, and submit the required No Longer Interested (NLI) notice to the California Department of Justice within the required five-day window. Completing this step ensures your information is handled properly and keeps our records accurate and compliant with state requirements.
      </p>
      <div class="divider"></div>
      <p style="font-size:14px;font-weight:600;margin-bottom:14px;">Do you agree to submit the Ending Volunteer Service Form when you're no longer volunteering?</p>
      <div class="yn-wrap">
        <button class="yn-btn${ans==='yes'?' yn-yes':''}" onclick="setI10('yes')">Yes, I agree</button>
        <button class="yn-btn${ans==='no'?' yn-no':''}"  onclick="setI10('no')">No</button>
      </div>
      ${ans === 'no' ? `
        <div class="notice danger" style="margin-bottom:0;">
          <div class="notice-label">Are You Sure?</div>
          <p style="margin-bottom:14px;">Submitting this form when you're done volunteering is required under California law and cannot be waived. Without this agreement, we're unable to complete your registration.</p>
          <button class="btn btn-danger" onclick="fail('departing')" style="font-size:13px;padding:10px 20px;">I understand — I cannot proceed</button>
        </div>
      ` : ''}
      <div class="nav-row">
        <button class="btn btn-outline" onclick="prevItem()">${I.arrowL} Back</button>
        <button class="btn btn-primary" onclick="nextItem()" ${ans==='yes'?'':'disabled'}>Continue ${I.arrowR}</button>
      </div>
    </div>`;
}

// ── ITEM 11 ──────────────────────────────────────────────────
function item11(pos, total) {
  const isMinor = S.track === 3;
  const title   = isMinor ? 'Completion Agreement — Parent/Guardian Required' : 'Completion Agreement';
  const sub     = isMinor
    ? 'Please have your parent or guardian complete the final form below to finish the registration process.'
    : 'Please complete this final form to officially finish your volunteer requirement process.';

  return `
    <div class="card">
      <div class="eyebrow">Step ${pos} of ${total} — Final Step</div>
      <h2 class="title">${title}</h2>
      <span class="pill">${I.clock} &nbsp;~2 minutes</span>
      <p class="body-text">${sub}</p>
      <div class="pc-block">
        <div class="pc-block-icon">${I.form}</div>
        <p>Click below to open the Completion Agreement form. It will open in a new tab.</p>
        <a href="https://lcc-volunteers-507455.churchcenter.com/people/forms/1209077" data-open-in-church-center-modal="true" class="btn btn-primary" style="margin-top:4px;">Open Completion Agreement ${I.external}</a>
      </div>
      <p class="small-text" style="text-align:center;">Return here after submitting, then click Finish below.</p>
      ${navRow('nextItem()', "I've Submitted — Finish", false)}

}

// ── FAIL ─────────────────────────────────────────────────────
function renderFail() {
  const msgs = {
    background: { title:'Background Check Required',
      body:"A background check is a mandatory requirement for all LCC Redding volunteers. Because this step cannot be skipped, we're unable to move forward with your registration at this time. If you change your mind, you're welcome to start over." },
    minor: { title:'Agreement Required to Continue',
      body:"Completing adult volunteer requirements when you turn 18 is a condition of volunteering as a minor. Because this is required, we're unable to move forward. If you change your mind, you're welcome to start over." },
    departing: { title:'Agreement Required to Continue',
      body:"Submitting the Ending Volunteer Service Form when you're done is required under California law and cannot be waived. Because of this, we're unable to complete your registration. If you change your mind, you're welcome to start over." }
  };
  const m = msgs[S.failId] || msgs.background;

  return `
    <div class="fail-card">
      <div class="fail-icon">${I.x}</div>
      <h2>${m.title}</h2>
      <p>${m.body}</p>
      <button class="btn btn-outline" onclick="reset()">Start Over</button>
    </div>`;
}

// ── COMPLETE ─────────────────────────────────────────────────
function renderComplete() {
  return `
    <div class="complete-card">
      <img src="logo-white.png" class="complete-logo" alt="LCC Redding" onerror="this.style.display='none'">
      <div class="complete-icon">${I.check}</div>
      <h2>You're all set.</h2>
      <p>
        Thank you for completing your volunteer registration at LCC Redding. Your information has been submitted and your requirements are on file. We're glad to have you serving with us.<br><br>
        If you have any questions, reach out to your ministry leader or contact our team.
      </p>
    </div>
    <div style="text-align:center;margin-top:16px;">
      <button class="btn btn-ghost" onclick="reset()">${I.arrowL} Return to Home</button>
    </div>`;
}

// ── EVENT HANDLERS ───────────────────────────────────────────
function attachListeners() {
  const zone = document.getElementById('uploadZone');
  if (!zone) return;
  zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    const f = e.dataTransfer?.files[0];
    if (f) { const ok = document.getElementById('uploadOk'); if (ok) { ok.style.display='block'; ok.textContent='Uploaded: ' + f.name; } }
  });
}

function pickMinistry(idx) {
  const m = MINISTRIES[idx];
  S.q1 = m;
  if (!YOUTH_OPT.includes(m)) S.q2 = null;
  S.q3 = null;
  render();
}
function pickQ2(v) { S.q2 = v; S.q3 = null; render(); }
function pickQ3(v) { S.q3 = v; render(); }

function setI4(v)     { S.i4ans  = v; if (v==='yes') nextItem(); else render(); }
function setI5cert(v) { S.i5cert = v; render(); }
function setI9(v)     { S.i9ans  = v; if (v==='yes') nextItem(); else render(); }
function setI10(v)    { S.i10ans = v; if (v==='yes') nextItem(); else render(); }

// ── INIT ─────────────────────────────────────────────────────
render();
</script>
